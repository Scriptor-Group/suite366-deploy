# Two vLLM instances + a tiny nginx proxy on the DGX Spark's Blackwell GPU
# (GB10, sm_121). The proxy presents a SINGLE OpenAI-compatible endpoint
# (port ${PROXY_PORT}) and routes by URL path:
#   • /v1/embeddings  -> vllm-embed (Qwen3-VL-Embedding-8B)
#   • everything else -> vllm-llm   (Gemma 4, chat + vision)
# This matches the Suite 366 PR #325 env contract (single VLLM_BASE_URL,
# role-specific VLLM_MODEL_*). The Suite 366 chart is wired automatically via
# values-dgx-spark.yaml.
#
# ⚠️ UNIFIED memory: the GB10 shares a single pool (~128 GB) between CPU, GPU,
# OS, container runtime, model weights, and KV cache. BOTH vLLM instances pull
# from this same pool -> we explicitly bound each one via
# --gpu-memory-utilization (sum < 1.0, headroom kept for OS/runtime/KV).
#
# Measurements on Spark (Gemma-4-26B-A4B-NVFP4, vLLM 0.19 cu130-nightly):
#   • gpu_memory_utilization=0.55 -> KV cache = 402,416 tokens (fp8)
#   • Prefill rate: 62k -> 65s, 200k -> 565s (~quadratic scaling on GB10)
#   • No preemption observed up to 2 concurrent requests; the practical
#     bottleneck is prefill compute, not memory.
#
# Values (${...}) are read from the `.env` file generated by install.sh.
# Launched by the systemd unit `suite366-vllm.service`.
services:
  vllm-llm:
    image: ${VLLM_IMAGE}
    container_name: suite366-vllm-llm
    restart: unless-stopped
    # `gpus: all` (compose v2.3+): the modern equivalent of `--gpus all`. More
    # portable than `runtime: nvidia`, which requires `nvidia-ctk runtime
    # configure` (the installer runs it, but this path also works without).
    gpus: all
    ipc: host
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY}
      # NVFP4 backends on GB10: only MARLIN (weight-only) is functional in
      # vLLM 0.19; the FLASHINFER_TRTLLM/CUTLASS paths crash at load time.
      # Revisit once native sm_121 FP4 kernels ship in vLLM.
      VLLM_USE_FLASHINFER_MOE_FP4: "0"
      VLLM_NVFP4_GEMM_BACKEND: marlin
      VLLM_NO_USAGE_STATS: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      DO_NOT_TRACK: "1"
    volumes:
      - ${MODELS_DIR}:/root/.cache/huggingface
      # Chat template required by --tool-call-parser=gemma4 (without it, vLLM
      # crashes at boot with "chat template not found").
      - ./tool_chat_template_gemma4.jinja:/app/tool_chat_template_gemma4.jinja:ro
    # Bind on the LAN IP: reachable by k3s pods via the node's IP. Kept
    # exposed for direct debugging; the chart talks to the LiteLLM proxy.
    ports:
      - "${HOST_IP}:${LLM_PORT}:8000"
    command:
      - --model=${LLM_MODEL}
      - --served-model-name=${LLM_MODEL}
      - --trust-remote-code
      - --dtype=auto
      # NVFP4: --quantization=modelopt required (auto-detection loads the
      # checkpoint fine but skips the MoE marlin optimizations).
      - --quantization=modelopt
      - --moe-backend=marlin
      - --tensor-parallel-size=1
      # Memory budget within the shared unified pool (see header).
      - --gpu-memory-utilization=${LLM_GPU_MEM_UTIL}
      - --max-model-len=${LLM_MAX_MODEL_LEN}
      # GB10 has very limited prefill compute. Beyond 2 concurrent large-
      # context requests, chunked_prefill collapses gen throughput (measured:
      # 0.6 t/s during concurrent prefill), with no real benefit.
      - --max-num-seqs=${LLM_MAX_NUM_SEQS}
      - --kv-cache-dtype=fp8
      - --enable-chunked-prefill
      # Critical for conversational agents: ~50%+ hit observed on synthetic
      # prompts, expected >80% in prod (stable system prompt).
      - --enable-prefix-caching
      - --async-scheduling
      - --chat-template=/app/tool_chat_template_gemma4.jinja
      - --enable-auto-tool-choice
      - --tool-call-parser=gemma4
      - --reasoning-parser=gemma4
      - --host=0.0.0.0
      - --port=8000
    healthcheck:
      # The vllm/vllm-openai image does not ship wget; curl is present.
      test: ["CMD", "sh", "-c", "curl -fsS -m 3 http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 40
      start_period: 600s

  vllm-embed:
    image: ${VLLM_IMAGE}
    container_name: suite366-vllm-embed
    restart: unless-stopped
    gpus: all
    ipc: host
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY}
      VLLM_NO_USAGE_STATS: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      DO_NOT_TRACK: "1"
      # Qwen3-VL: no URL fetching at boot (the model can take images as input;
      # we disable redirects for security).
      VLLM_MEDIA_URL_ALLOW_REDIRECTS: "0"
    volumes:
      - ${MODELS_DIR}:/root/.cache/huggingface
    ports:
      - "${HOST_IP}:${EMBED_PORT}:8000"
    command:
      - --model=${EMBED_MODEL}
      - --served-model-name=${EMBED_MODEL}
      - --trust-remote-code
      # Qwen3-VL-Embedding-8B loads in pooling mode (sentence-transformer).
      # `--task=embed` is deprecated, use --runner=pooling.
      - --runner=pooling
      - --dtype=bfloat16
      - --tensor-parallel-size=1
      # Reduced share of the unified pool. 0.20 is too low (15.5 GiB of BF16
      # weights leave no room for KV: -1.83 GiB) -> 0.25 minimum.
      - --gpu-memory-utilization=${EMBED_GPU_MEM_UTIL}
      # 8k is plenty for RAG chunks; 32k just burns more KV without benefit.
      - --max-model-len=${EMBED_MAX_MODEL_LEN}
      - --limit-mm-per-prompt.image=4
      - --limit-mm-per-prompt.video=0
      - --host=0.0.0.0
      - --port=8000
    # Boot after the LLM: otherwise both services reserve their slice of the
    # unified pool at the same time and the second one can be OOM-killed by
    # vLLM.
    depends_on:
      vllm-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS -m 3 http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 40
      start_period: 600s

  # Tiny URL-path proxy: single OpenAI-compatible entry point routing to the
  # two vLLM instances by URL path (/v1/embeddings -> vllm-embed, everything
  # else -> vllm-llm). Suite 366 (PR #325) reads VLLM_BASE_URL = this proxy
  # and selects a model per role via VLLM_MODEL_HIGH/_VISION/_EMBEDDING.
  vllm-proxy:
    image: ${PROXY_IMAGE}
    container_name: suite366-vllm-proxy
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HOST_IP}:${PROXY_PORT}:8000"
    depends_on:
      vllm-llm:
        condition: service_healthy
      vllm-embed:
        condition: service_healthy
    healthcheck:
      # nginx:alpine ships wget (busybox); /health is served by our own conf.
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
