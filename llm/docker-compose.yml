# vLLM ×2 on the host GPU (OpenAI-compatible) — no router in front.
# Each service exposes its own endpoint; the app -> AI wiring is done MANUALLY
# (see ../docs/gpu-inference.md).
#
# This overlay is deployed by install.sh ONLY when an NVIDIA GPU is detected
# (or WITH_GPU=1 is forced). On a CPU-only host it is skipped entirely.
#
# NOTE on unified-memory appliances (e.g. NVIDIA GB10 / DGX Spark): a single
# pool (~128 GB) is shared between CPU, GPU, OS, container runtime, model
# weights and KV cache. Both vLLM instances draw on it, so each is bounded via
# --gpu-memory-utilization (sum < 1.0, margin left for OS/runtime/KV). On a
# discrete GPU with dedicated VRAM you can raise these values.
#
# Values (${...}) are read from the `.env` file generated by install.sh.
# Launched by the systemd unit `suite366-vllm.service`.
services:
  vllm-llm:
    image: ${VLLM_IMAGE}
    container_name: suite366-vllm-llm
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY}
    volumes:
      - ${MODELS_DIR}:/root/.cache/huggingface
    # Bound to the LAN IP so the k3s pods can reach it via the node IP.
    ports:
      - "${HOST_IP}:${LLM_PORT}:8000"
    command:
      - --model=${LLM_MODEL}
      - --served-model-name=${LLM_MODEL}
      # NVFP4 checkpoints carry their quantization in the config -> do NOT force
      # --quantization (let vLLM pick the right FP4 backend). Set it only to
      # quantize a non-pre-quantized checkpoint at load time.
      - --trust-remote-code
      - --gpu-memory-utilization=${LLM_GPU_MEM_UTIL}
      # Small-batch target on unified-memory appliances: past ~4 concurrent
      # streams TTFT and the bandwidth/token tax climb fast (vLLM Spark blog).
      - --max-num-seqs=${LLM_MAX_NUM_SEQS}
      - --max-model-len=${LLM_MAX_MODEL_LEN}
      - --host=0.0.0.0
      - --port=8000
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 600s

  vllm-embed:
    image: ${VLLM_IMAGE}
    container_name: suite366-vllm-embed
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY}
    volumes:
      - ${MODELS_DIR}:/root/.cache/huggingface
    ports:
      - "${HOST_IP}:${EMBED_PORT}:8000"
    command:
      - --model=${EMBED_MODEL}
      - --served-model-name=${EMBED_MODEL}
      - --task=embed
      # Qwen3-VL ships custom code -> required to load the model.
      - --trust-remote-code
      # Smaller share of the unified pool (the generative model has priority).
      - --gpu-memory-utilization=${EMBED_GPU_MEM_UTIL}
      - --host=0.0.0.0
      - --port=8000
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 600s
