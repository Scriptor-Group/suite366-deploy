# Tiny URL-path router that unifies the two local vLLM instances behind a
# SINGLE OpenAI-compatible endpoint — matches the Suite 366 PR #325 contract
# (one `VLLM_BASE_URL`, role-specific `VLLM_MODEL_*`).
#
# Routing :
#   /v1/embeddings  -> vllm-embed:8000   (Qwen3-VL-Embedding-8B, pooling)
#   /v1/models      -> vllm-llm:8000     (chart only uses VLLM_MODEL_*, so we
#                                         expose the chat model list — for
#                                         discovery purposes)
#   everything else -> vllm-llm:8000     (chat completions, completions,
#                                         chat templates, etc. — Gemma 4 is
#                                         multimodal so /v1/chat/completions
#                                         handles vision too)
#
# Service names (vllm-llm, vllm-embed) resolve via the compose default network.

events {}

http {
  # GB10 prefill at 200k+ tokens can take ~10 min; the timeouts must cover it.
  proxy_connect_timeout 30s;
  proxy_send_timeout    1800s;
  proxy_read_timeout    1800s;
  send_timeout          1800s;

  # Vision/OCR pipelines POST screenshots + multi-page PDFs (base64-encoded
  # inside /v1/chat/completions content blocks) to vLLM. Nginx default of
  # 1 MB drops them with 413 — symptom: "RunicEnrich screenshot vision
  # failed page=N: 413" and "FileProcessing OCR FAILED ... error=413" in
  # drive-app logs. vLLM itself enforces per-model limits, so the proxy
  # just needs to not be the chokepoint.
  client_max_body_size 100M;

  upstream vllm_llm   { server vllm-llm:8000; }
  upstream vllm_embed { server vllm-embed:8000; }

  server {
    listen 8000;
    server_name _;

    # Liveness for our own healthcheck (Compose). Cheap, doesn't probe vLLM.
    location = /health {
      access_log off;
      return 200 '{"status":"ok"}';
      default_type application/json;
    }

    location = /v1/embeddings {
      proxy_pass         http://vllm_embed;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_buffering    off;     # never buffer; embed responses are small
    }

    location = /v1/models {
      proxy_pass         http://vllm_llm;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    location / {
      proxy_pass         http://vllm_llm;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_buffering          off;   # streaming chat completions
      proxy_request_buffering  off;   # 1MB+ prompts arrive in chunks
    }
  }
}
